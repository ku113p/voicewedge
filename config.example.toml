# voicewedge configuration.
# Copy this file to `config.toml` (same folder) and put your OpenRouter API key in it.
# config.toml is searched: ./config.toml (the app's working dir), then
# %APPDATA%\voicewedge\config.toml. It is gitignored — your key stays out of the repo.
# Edit, then restart the app (tray -> Quit, relaunch) to apply.

# Global hotkey to START recording. Then Enter finishes, Escape cancels.
# Modifiers: Super (Windows key), Ctrl, Alt, Shift. Run `cargo run --example
# probe_hotkeys` to see which combos are free on your machine.
hotkey = "Super+Alt+Space"

# Stop mode. Currently only "enter_to_stop" (Enter = finish, Escape = cancel).
mode = "enter_to_stop"

# Which profile is active. You can also switch this in the tray menu.
active_profile = "biograph"

# --- Profiles -----------------------------------------------------------------
# One hotkey records; the ACTIVE profile's `template` builds the inserted text.
# Placeholders: {text} = transcript, {path} = absolute WAV path, {filename} = file name.
[[profiles]]
name        = "biograph"
template    = "{text}\n{{voice: {path}}}"       # transcript, newline, then a {{voice: <path>}} marker (NOT a slash command)
press_enter = true                               # press Enter after inserting (submit)

[[profiles]]
name        = "plain"
template    = "{text}"                            # just the transcript, no submit
press_enter = false

# --- Speech-to-text (OpenRouter) ----------------------------------------------
[stt]
provider     = "openrouter"
# Default won our Russian A/B. Alternatives: openai/whisper-large-v3,
# qwen/qwen3-asr-flash-2026-02-10, google/chirp-3.
model        = "openai/gpt-4o-transcribe"
# "layout" = follow active keyboard layout (RU->ru, EN->en) | "auto" = model
# detects | a fixed code like "ru" / "en".
language     = "layout"
api_key      = ""                            # paste your OpenRouter key here
api_key_env  = "OPENROUTER_API_KEY"          # ...or leave api_key empty and set this env var
endpoint     = "https://openrouter.ai/api/v1/audio/transcriptions"
timeout_secs = 60

# --- Text injection -----------------------------------------------------------
[inject]
# "type"  = simulate typing (Unicode; reliable for any language, incl. Cyrillic)
# "paste" = set clipboard + Ctrl+V (instant for long text; restores clipboard)
method            = "type"
restore_clipboard = true

# --- Audio --------------------------------------------------------------------
[audio]
inbox_dir   = "recordings"   # where WAVs are saved (relative to the working dir, or an absolute path)
sample_rate = 16000          # informational; capture uses the input device's rate
format      = "wav"
max_seconds = 180            # auto-stop after this many seconds (safety limit)

# --- Feedback -----------------------------------------------------------------
[feedback]
overlay       = true   # (reserved) on-screen recording indicator
toast         = true   # Windows toast notifications (start / done / cancel / error)
sound         = true   # audio cues: rising = start, ding = finish, low tu-du = problem
require_focus = true   # before recording, require a focused text field; else alert + skip
